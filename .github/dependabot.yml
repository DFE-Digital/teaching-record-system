version: 2
updates:

  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: 'daily'
    groups:
      dotnet:
        patterns:
          - 'Microsoft.AspNetCore.*'
          - 'Microsoft.EntityFrameworkCore.*'
          - 'Microsoft.Extensions.*'
          - 'System.Net.Http.Json'
      Serilog:
        patterns:
          - 'Serilog.*'
      OpenIddict:
        patterns:
          - 'OpenIddict.*'
      Hangfire:
        patterns:
          - 'Hangfire.*'
      Sentry:
        patterns:
          - 'Sentry.*'
      NSign:
        patterns:
          - 'NSign.*'
      xunit:
        patterns:
          - 'xunit.*'
      DfeAnalytics:
        patterns:
          - 'DfeAnalytics.*'
      Htmx:
        patterns:
          - 'Htmx*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: 'daily'

  - package-ecosystem: terraform
    directory: /terraform/
    schedule:
      interval: 'daily'
